name: Linux.do AI Monitor

on:
  schedule:
    # 每天北京时间 9:07 运行一次
    - cron: '7 1 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # 如果有 GitHub Secrets，动态注入到 config.json
          python -c "
          import json
          with open('config.json', 'r') as f:
              c = json.load(f)
          import os
          bk = os.environ.get('BARK_KEY', '')
          fw = os.environ.get('FEISHU_WEBHOOK', '')
          if bk:
              c['push']['bark']['enabled'] = True
              c['push']['bark']['key'] = bk
          if fw:
              c['push']['feishu']['enabled'] = True
              c['push']['feishu']['webhook_url'] = fw
          with open('config.json', 'w') as f:
              json.dump(c, f, indent=2, ensure_ascii=False)
          "
          python monitor.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: update AI monitor report ${{ github.run_number }}'
